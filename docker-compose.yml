version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
